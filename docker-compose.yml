services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: interop
      POSTGRES_USER: interop
      POSTGRES_PASSWORD: interop
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: ./data-event-ai-caseware
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interop
      RANKER_URL: http://ranker:8000
    volumes:
      - ./state:/app/state
      - ./lake:/app/lake
      - ./events:/app/events

  ranker:
    build: ./data-event-ai-ranker
    ports:
      - "8000:8000"