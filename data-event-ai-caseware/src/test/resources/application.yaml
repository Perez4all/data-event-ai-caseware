spring:
  application:
    name: data-event-ai-caseware
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
caseware:
  schema:
    fingerprint:
      customers: "3fda1462b573d1b21d6b3a853a5311828f5a16dd72d912e29c1bc5d8c63ff0ad"
      cases: "001a11d0b0167f2a482c7300d68cdeb7a0fc8a0c16e76c877225514e791f70e5"
  path:
    lakeOutputFilename: "data.jsonl"
    checkpoint: "${java.io.tmpdir}/caseware-test/state/checkpoint.json"
    customers-lake: "${java.io.tmpdir}/caseware-test/lake/customers"
    cases-lake: "${java.io.tmpdir}/caseware-test/lake/cases"
    events-lake: "${java.io.tmpdir}/caseware-test/events/events.jsonl"
ranker:
  url: http://localhost:8000

